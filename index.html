<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Vício Total 🧬</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;background:#0f172a;color:#fff;display:flex;justify-content:center}
#game{max-width:420px;width:100%;padding:16px;text-align:center}
.card{background:#1e293b;border-radius:14px;padding:14px;margin:10px 0}
#teacher{font-size:50px;transition:0.2s}
#board{font-size:22px;margin-top:8px}
#options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
button{padding:14px;border-radius:10px;border:none;background:#22c55e;color:#fff;font-size:16px;cursor:pointer;transition:0.2s}
button:hover{transform:scale(1.05)}
#hud{display:flex;justify-content:space-between;font-size:14px}
#combo{font-size:18px;color:#facc15}
</style>
</head>
<body>
<div id="game"><div id="startScreen" class="card">
<h3>Seu nome</h3>
<input id="nameInput" style="width:100%;padding:10px;border-radius:8px"/>
<button onclick="startGame()">Começar</button>
</div><div id="playScreen" style="display:none">
<div class="card">
<div id="teacher">👩‍🏫</div>
<div id="board"></div>
<div id="feedback"></div>
<div id="combo"></div>
</div><div id="options"></div><div class="card" id="hud">
<div id="timer"></div>
<div id="score"></div>
</div>
</div><div id="endScreen" style="display:none" class="card">
<h3>Resultado</h3>
<div id="finalStats"></div>
<div id="ranking"></div>
<button onclick="location.reload()">Jogar novamente</button>
</div></div><script>
let name="";
let correct=0,wrong=0;
let streak=0,maxStreak=0;
let comboMulti=1;
let currentAnswer=0;
let time=60;
let timer;

function randGene(){return Math.random()<0.5?"A":"a"}
function indiv(){return randGene()+randGene()}
function cross(a,b){let c=[];for(let x of a){for(let y of b){c.push(x+y)}}return c}
function chance(c){return (c.filter(x=>x==="aa").length/c.length)*100}

function startGame(){
 name=document.getElementById("nameInput").value||"Player";
 document.getElementById("startScreen").style.display="none";
 document.getElementById("playScreen").style.display="block";
 nextQ(); startTimer();
}

function nextQ(){
 let p1=indiv(),p2=indiv();
 currentAnswer=chance(cross(p1,p2));
 document.getElementById("board").textContent=`${p1} × ${p2}`;
 renderOpts();
}

function renderOpts(){
 let o=document.getElementById("options");o.innerHTML="";
 let vals=[0,25,50,75,100].sort(()=>Math.random()-0.5);
 vals.slice(0,4).forEach(v=>{
  let b=document.createElement("button");
  b.textContent=v+"%";
  b.onclick=()=>ans(v);
  o.appendChild(b);
 });
}

function ans(v){
 if(v===currentAnswer){
  streak++; correct++;
  if(streak>maxStreak) maxStreak=streak;
  comboMulti = 1 + Math.floor(streak/3);
  document.getElementById("feedback").textContent="⭐ Acertou!";
 } else {
  wrong++; streak=0; comboMulti=1;
  document.getElementById("feedback").textContent="😡 Errou!";
 }
 updateHUD(); nextQ();
}

function updateHUD(){
 document.getElementById("score").textContent=`⭐ ${correct} | ❌ ${wrong}`;
 document.getElementById("combo").textContent=`🔥 Combo x${comboMulti}`;
}

function startTimer(){
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").textContent=`⏱ ${time}s`;
  if(time<=0){clearInterval(timer);endGame();}
 },1000);
}

function endGame(){
 document.getElementById("playScreen").style.display="none";
 document.getElementById("endScreen").style.display="block";
 let score=(correct-wrong)*comboMulti;
 document.getElementById("finalStats").innerHTML=
 `Nome: ${name}<br>⭐ ${correct}<br>❌ ${wrong}<br>🔥 Max Streak: ${maxStreak}<br>🏆 Score: ${score}`;
 save(score);
 load();
}

function save(score){
 let d=JSON.parse(localStorage.getItem("rank")||"[]");
 d.push({name,score});
 d.sort((a,b)=>b.score-a.score);
 d=d.slice(0,10);
 localStorage.setItem("rank",JSON.stringify(d));
}

function load(){
 let d=JSON.parse(localStorage.getItem("rank")||"[]");
 let h="";
 d.forEach((p,i)=>h+=`${i+1}. ${p.name} - ${p.score}<br>`);
 document.getElementById("ranking").innerHTML=h;
}
</script></body>
           </html>
