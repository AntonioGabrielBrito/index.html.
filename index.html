<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Boss Fight 🧬🐍</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:#fff;
  overflow:hidden;
}
#game{max-width:420px;margin:auto;padding:20px;text-align:center}
#monster{
  font-size:48px;
  margin:20px 0;
  animation:float 2s infinite ease-in-out;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.hit{animation:hit 0.2s}
@keyframes hit{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
#genes{
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:12px;
  margin:12px 0;
  backdrop-filter:blur(6px);
}
#options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(145deg,#1e293b,#0f172a);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:scale(1.05)}
button:active{transform:scale(0.9)}
#hud{display:flex;justify-content:space-between;margin-top:10px}
#cityBar{height:12px;background:#222;border-radius:10px;overflow:hidden;margin-top:10px}
#city{height:100%;width:100%;background:linear-gradient(90deg,#ff4d4d,#ff0000);transition:0.3s}
#timer{color:#f87171}
#flash{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:white;opacity:0;pointer-events:none;
}
.explode{animation:explode 0.3s}
@keyframes explode{0%{opacity:0.8}100%{opacity:0}}
</style>
</head>
<body>
<div id="flash"></div>
<div id="game">
<h2>🏙️ Defesa Genética</h2>
<div id="monster"></div>
<div id="genes"></div>
<div id="options"></div>
<div id="hud">
  <div id="timer"></div>
  <div id="hp"></div>
</div>
<div id="cityBar"><div id="city"></div></div>
</div><script>
let health=100,segments=8,currentAnswer=0,time=10,timerInterval;

function randGene(){return Math.random()<0.5?"A":"a"}
function indiv(){return randGene()+randGene()}

function cross(a,b){let c=[];for(let x of a){for(let y of b){c.push(x+y)}}return c}
function chance(c){return (c.filter(x=>x==="aa").length/c.length)*100}

function gen(){
 let diff=8-segments,text,ch;
 if(diff<3){
  let p1=indiv(),p2=indiv();
  text=`${p1} × ${p2}`;
  ch=chance(cross(p1,p2));
 }else{
  let g1=indiv(),g2=indiv(),g3=indiv(),g4=indiv();
  let p1=cross(g1,g2)[Math.floor(Math.random()*4)];
  let p2=cross(g3,g4)[Math.floor(Math.random()*4)];
  text=`Avós: ${g1}×${g2} | ${g3}×${g4}\nPais: ${p1} × ${p2}`;
  ch=chance(cross(p1,p2));
 }
 currentAnswer=ch;
 document.getElementById("genes").textContent=text;
 opts(); timer();
}

function opts(){
 let o=document.getElementById("options");o.innerHTML="";
 let v=[0,25,50,75,100].sort(()=>Math.random()-0.5);
 v.slice(0,4).forEach(x=>{
  let b=document.createElement("button");
  b.textContent=x+"%";
  b.onclick=()=>ans(x);
  o.appendChild(b);
 })
}

function ans(v){v===currentAnswer?hit():dmg()}

function hit(){
 segments--;
 let m=document.getElementById("monster");
 m.classList.add("hit");
 flash();
 setTimeout(()=>m.classList.remove("hit"),150);
 upd();
 if(segments<=0){alert("🏆 Vitória!");reset();return}
 gen();
}

function dmg(){
 health-=15;
 document.getElementById("city").style.width=health+"%";
 flash();
 upd();
 if(health<=0){alert("💀 Derrota!");reset()}
}

function flash(){
 let f=document.getElementById("flash");
 f.classList.add("explode");
 setTimeout(()=>f.classList.remove("explode"),200);
}

function upd(){
 document.getElementById("monster").textContent="🐍".repeat(segments);
 document.getElementById("hp").textContent=`Cidade: ${health}%`;
}

function timer(){
 clearInterval(timerInterval);
 time=10;showT();
 timerInterval=setInterval(()=>{
  time--;showT();
  if(time<=0){clearInterval(timerInterval);dmg();gen()}
 },1000)
}

function showT(){document.getElementById("timer").textContent=`⏱ ${time}s`}

function reset(){health=100;segments=8;document.getElementById("city").style.width="100%";upd();gen()}

reset();
</script></body>
</html>
