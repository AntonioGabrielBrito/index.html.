<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Fight Genética Evolutiva 🧬🐍</title>
<style>
  body { margin:0; font-family:Arial; background:#0a0a0a; color:#fff; text-align:center; overflow:hidden; }
  #game { padding:20px; }
  #monster { font-size:50px; margin:10px; transition:0.3s; }
  #genes { font-size:26px; margin:10px; }
  #options button { margin:8px; padding:15px; font-size:18px; background:#222; color:#fff; border:2px solid #555; cursor:pointer; }
  #city { height:20px; background:red; margin-top:20px; transition:0.3s; }
  #timer { font-size:22px; margin:10px; color:#ff4444; }
  .hit { transform:scale(1.3); color:#ff4444; }
</style>
</head>
<body>
<div id="game">
  <h1>🏙️ BOSS Genético Evolutivo 🧬🐍</h1>
  <p>A dificuldade aumenta conforme você destrói o monstro!</p>
  <div id="timer"></div>
  <div id="monster"></div>
  <div id="genes"></div>
  <div id="options"></div>
  <div id="city"></div>
</div><script>
let health = 100;
let segments = 8;
let currentAnswer = 0;
let time = 10;
let timerInterval;

function randomGene(){ return Math.random()<0.5 ? "A" : "a"; }

function generateIndividual(){ return randomGene()+randomGene(); }

function cross(p1,p2){
  let combos=[];
  for(let g1 of p1){
    for(let g2 of p2){ combos.push(g1+g2); }
  }
  return combos;
}

function calculateChanceAA(combos){
  return (combos.filter(c=>c==="aa").length/combos.length)*100;
}

function generateCross(){
  let difficulty = 8 - segments;
  let text="";
  let chance=0;

  if(difficulty < 3){
    // básico
    let p1 = generateIndividual();
    let p2 = generateIndividual();
    text = `${p1} x ${p2}`;
    chance = calculateChanceAA(cross(p1,p2));
  } else {
    // avançado com avós
    let g1 = generateIndividual();
    let g2 = generateIndividual();
    let g3 = generateIndividual();
    let g4 = generateIndividual();

    let parent1 = cross(g1,g2);
    let parent2 = cross(g3,g4);

    // escolher aleatoriamente possíveis filhos dos pais
    let p1 = parent1[Math.floor(Math.random()*parent1.length)];
    let p2 = parent2[Math.floor(Math.random()*parent2.length)];

    text = `Avós: ${g1}x${g2} e ${g3}x${g4} → Pais: ${p1} x ${p2}`;
    chance = calculateChanceAA(cross(p1,p2));
  }

  currentAnswer = chance;
  document.getElementById("genes").textContent = text;

  createOptions();
  resetTimer();
}

function createOptions(){
  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  let choices = [0,25,50,75,100];
  choices.sort(()=>Math.random()-0.5);

  choices.slice(0,4).forEach(val => {
    let btn = document.createElement("button");
    btn.textContent = val + "%";
    btn.onclick = ()=> checkAnswer(val);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(val){
  if(val === currentAnswer){ hitMonster(); }
  else { damageCity(); }
}

function hitMonster(){
  segments--;
  const monster = document.getElementById("monster");
  monster.classList.add("hit");
  setTimeout(()=> monster.classList.remove("hit"),200);

  updateMonster();

  if(segments<=0){
    alert("🏆 BOSS derrotado! Você dominou genética avançada!");
    resetGame();
    return;
  }

  generateCross();
}

function damageCity(){
  health -= 15;
  document.getElementById("city").style.width = health + "%";

  if(health<=0){
    alert("💀 A cidade foi destruída!");
    resetGame();
  }
}

function updateMonster(){
  document.getElementById("monster").textContent = "🐍".repeat(segments);
}

function resetTimer(){
  clearInterval(timerInterval);
  time = 10;
  document.getElementById("timer").textContent = `⏱️ ${time}s`;

  timerInterval = setInterval(()=>{
    time--;
    document.getElementById("timer").textContent = `⏱️ ${time}s`;

    if(time<=0){
      clearInterval(timerInterval);
      damageCity();
      generateCross();
    }
  },1000);
}

function resetGame(){
  health = 100;
  segments = 8;
  document.getElementById("city").style.width = "100%";
  updateMonster();
  generateCross();
}

resetGame();
</script></body>
</html>
